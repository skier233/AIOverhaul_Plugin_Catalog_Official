# Reencode worker sidecar for the jiwenji_reencode plugin.
# GPU-accelerated H.265 re-encoding, isolated from the main backend.
#
# Usage (from the Stash-AIServer root):
#   docker compose -f docker-compose.yml -f plugins/jiwenji_reencode/docker-compose.yml up -d
#
services:
  reencode_worker:
    build:
      context: ../..
      dockerfile: plugins/jiwenji_reencode/Dockerfile
    image: stash-ai-server-reencode:local
    container_name: ai-overhaul-reencode-worker
    restart: always
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file:
      - ../../config.env
    environment:
      - REENCODE_WORKER=1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    volumes:
      - ../../data:/app/data:rw
      - ../../plugins:/app/plugins:rw
      - ${STASH_MEDIA_PATH:-/path/to/your/media}:/app/stash:rw
      - ${STASH_CONFIG_PATH:-/path/to/your/.stash}:/app/.stash:ro
      - ../../backend/stash_ai_server:/usr/local/lib/python3.14/site-packages/stash_ai_server:ro
      # Mount worker source so edits take effect without rebuilding
      - ./reencode_worker:/app/reencode_worker:ro
